name: Live Executor

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  statuses: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e . -r scripts/requirements-live.txt

      - name: Run live executor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TRADEMEMORY_API_URL: ${{ secrets.TRADEMEMORY_API_URL }}
          BINANCE_BASE_URL: https://data-api.binance.vision
        run: python scripts/live_executor.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.error('Live executor failed. Check the workflow run for details.')
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Live executor workflow failed',
              context: 'live-executor'
            })
