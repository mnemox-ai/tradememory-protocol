services:
  - type: web
    name: tradememory-api
    env: python
    branch: master
    buildCommand: pip install -e .
    startCommand: uvicorn hosted.server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: TM_HOSTED_DB
        value: /tmp/hosted.db
      # Optional: seed API keys at startup
      # Format: key:account_id:plan (comma-separated for multiple)
      # e.g. tm_live_abc123:sean:pro
      - key: TM_API_KEYS
        sync: false
    domains:
      - mcp.mnemox.ai
